name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go test + vet (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, agent, bot]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -timeout 120s ./...
      - name: go build
        run: go build ./...

  bench-cli:
    name: Bench CLI smoke test
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: server/go.sum
      - name: Run bench unit test
        working-directory: server
        run: go test ./internal/analytics/... -run "Bench|Detector|Bootstrap" -v

  shell:
    name: Shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck all scripts
        run: |
          shopt -s globstar nullglob
          fail=0
          for f in scripts/*.sh; do
            echo "::group::$f"
            if ! shellcheck -S warning "$f"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  web:
    name: TypeScript + wrangler syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit

  python:
    name: Python script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile check
        run: |
          python -m py_compile scripts/generate-figures.py
          python -m py_compile scripts/validate-reliability.py
